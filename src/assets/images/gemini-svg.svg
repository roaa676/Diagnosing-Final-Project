<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- الخلفية الدائرية (جسم البوصلة) -->
  <circle cx="200" cy="200" r="180" stroke="#2D5A27" stroke-width="8" fill="#F0FFF0" />
  <circle cx="200" cy="200" r="160" stroke="#81C784" stroke-width="2" stroke-dasharray="10 10" />

  <!-- نقاط الاتجاهات الرئيسية -->
  <rect x="195" y="30" width="10" height="25" rx="5" fill="#2D5A27" />
  <rect x="195" y="345" width="10" height="25" rx="5" fill="#A5D6A7" />
  <rect x="30" y="195" width="25" height="10" rx="5" fill="#A5D6A7" />
  <rect x="345" y="195" width="25" height="10" rx="5" fill="#A5D6A7" />

  <!-- إبرة البوصلة (على شكل مسار) -->
  <path d="M200 60 L230 200 L200 230 L170 200 Z" fill="#2D5A27" />
  <path d="M200 340 L170 200 L200 170 L230 200 Z" fill="#81C784" />
  
  <!-- مركز البوصلة (العقل/الطفل) -->
  <circle cx="200" cy="200" r="15" fill="#FFFFFF" stroke="#2D5A27" stroke-width="4"/>
  
  <!-- رمز النمو (ورقة شجر صغيرة فوق الإبرة) -->
  <path d="M190 80 Q200 50 210 80 Q200 100 190 80" fill="#4CAF50" />

  <!-- نص الشعار (اختياري داخل الـ SVG) -->
  <text x="50%" y="85%" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#2D5A27">BOUSSALA</text>
  <text x="50%" y="92%" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4CAF50">التوجيه نحو التعلم الأفضل</text>
</svg>
