<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>إنشاء حساب</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    
    <div class="form-section">

        <a href="#" class="back-btn">← رجوع</a>

        <div class="form-header">
            <h1>إنشاء حساب جديد</h1>
            <p>
                هل لديك حساب بالفعل؟
                <a href="login.html">تسجيل الدخول</a>
            </p>
        </div>

        <form>

            <label>الاسم الكامل</label>
            <input type="text" placeholder="ادخل اسمك">

            <label>البريد الإلكتروني</label>
            <input type="email" placeholder="name@example.com">

            <label>كلمة السر</label>
            <input type="password" placeholder="********">

            <label>تأكيد كلمة السر</label>
            <input type="password" placeholder="********">

            <button type="submit">إنشاء الحساب وبدء الرحلة</button>

        </form>

    </div>


    
    <div class="side-section">
        <div class="side-content">
            <img src="child.png" alt="طفل">

            <h2>
                رحلة تعلم ممتعة <br>
                <span>تبدأ من هنا</span>
            </h2>

            <p>
                بوصلـه يساعدك في فهم طفلك بشكل أفضل
                وتشخيص صعوبات التعلم بطرق علمية مبسطة ومرحة
            </p>
        </div>
    </div>

</div>

</body>
</html>
